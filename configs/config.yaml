docker:
  hosts:
    - "unix:///var/run/docker.sock"
  include_patterns:
    - "*"
  since: "0s"

filters:
  warn_match:
    regexps:
      - '(?i)\b(WARN|ERROR)\b'
    exclude_regexps:
      - '\b(?:106\.55\.202\.118|113\.96\.223\.69|125\.39\.132\.125|43\.139\.209\.119)\b'
    json_fields:
      - "level"
    message_fields:
      - "message"
      - "msg"
      - "log"
    time_fields:
      - "ts"
  log_id_extract:
    json_keys:
      - "id"
    regexps:
      - '(?i)\bid["''=:\s]+([A-Za-z0-9._:-]+)'
      - '(?i)\brequest[_-]?id["''=:\s]+([A-Za-z0-9._:-]+)'
      - '(?i)\blog[_-]?id["''=:\s]+([A-Za-z0-9._:-]+)'
      - '(?i)\balert[_-]?id["''=:\s]+([A-Za-z0-9._:-]+)'
      - '(?i)\btrace[_-]?id["''=:\s]+([A-Za-z0-9._:-]+)'

aggregation:
  flush_size: 20
  flush_interval: "10s"
  unknown_log_id: "unknown"

dingtalk:
  webhook_url: ""
  secret: ""
  max_events: 5
  mention_levels:
    - "ERROR"
  at_mobiles:
    - ""
  at_all: false

storage:
  output_dir: "data"
